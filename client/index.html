<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="https://res.cloudinary.com/mann2729/image/upload/w_64,h_64,c_fill,g_center,z_1.5/v1772097164/logo_xdduls.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OverClocked | Premium Gaming Components</title>
    <script>
      (function () {
        try {
          var localTheme = localStorage.getItem("theme");
          if (localTheme === "light") {
            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
            if (!localTheme) localStorage.setItem("theme", "dark"); // Default to dark instantly
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
